name: Publish Skill from Issue

on:
  issues:
    types: [opened, reopened]

jobs:
  publish-skill:
    if: startsWith(github.event.issue.title, 'skill:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Parse issue and create skill
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ── Extract skill name from first line: "skill-name: my-skill" ──
          SKILL_NAME=$(echo "$ISSUE_BODY" | head -1 | sed 's/skill-name:[[:space:]]*//' | tr -d '[:space:]')

          if [ -z "$SKILL_NAME" ]; then
            gh issue comment $ISSUE_NUMBER --body "❌ Could not parse \`skill-name\` from the first line. Make sure the very first line is: \`skill-name: your-skill-name\`"
            exit 1
          fi

          echo "Skill name: $SKILL_NAME"

          # ── Extract SKILL.md content (everything after the second ---) ──
          SKILL_CONTENT=$(echo "$ISSUE_BODY" | awk 'BEGIN{count=0} /^---/{count++; next} count>=2{print}')

          if [ -z "$SKILL_CONTENT" ]; then
            gh issue comment $ISSUE_NUMBER --body "❌ Could not find SKILL.md content. Make sure there are two \`---\` lines separating the skill name from the content."
            exit 1
          fi

          # ── Create skill folder and file ──
          mkdir -p "$SKILL_NAME"
          printf '%s\n' "$SKILL_CONTENT" > "$SKILL_NAME/SKILL.md"
          echo "Created $SKILL_NAME/SKILL.md"
          cat "$SKILL_NAME/SKILL.md"

          # ── Update README skills table ──
          TODAY=$(date +%Y-%m-%d)
          DESC=$(echo "$SKILL_CONTENT" | grep -m1 '^description:' | sed 's/description:[[:space:]]*//' | cut -c1-80)

          NEW_ROW="| [$SKILL_NAME](./$SKILL_NAME) | $DESC | $TODAY |"

          if [ -f README.md ] && grep -q "| Skill |" README.md; then
            # Append new row after last table row
            python3 - <<PYEOF
          import re

          with open('README.md', 'r') as f:
              content = f.read()

          new_row = """$NEW_ROW"""
          # Find last table row and append after it
          pattern = r'(\|[^\n]+\|\n)(?!\|)'
          replacement = r'\1' + new_row + '\n'
          updated = re.sub(pattern, replacement, content, count=1, flags=re.MULTILINE)

          with open('README.md', 'w') as f:
              f.write(updated)
          print("README updated")
          PYEOF
          else
            # Create fresh skills table
            cat >> README.md << MDEOF

          ## 🧠 Skills

          | Skill | Description | Added |
          |-------|-------------|-------|
          $NEW_ROW
          MDEOF
          fi

          # ── Commit and push ──
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$SKILL_NAME/SKILL.md" README.md
          git commit -m "feat: add $SKILL_NAME skill (closes #$ISSUE_NUMBER)"
          git push

          # ── Comment and close issue ──
          gh issue comment $ISSUE_NUMBER --body "✅ **\`$SKILL_NAME\`** published!

          📄 [\`$SKILL_NAME/SKILL.md\`](../blob/main/$SKILL_NAME/SKILL.md)

          Closing automatically."
          gh issue close $ISSUE_NUMBER
