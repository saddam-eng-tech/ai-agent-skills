name: Publish Skill from Issue

on:
  issues:
    types: [opened, reopened]

jobs:
  publish-skill:
    if: startsWith(github.event.issue.title, 'skill:') && github.event.issue.user.login == 'saddam-eng-tech'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Parse issue and create skill
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ── Extract skill name from first line ──
          SKILL_NAME=$(echo "$ISSUE_BODY" | head -1 | sed 's/skill-name:[[:space:]]*//' | tr -d '[:space:]')

          if [ -z "$SKILL_NAME" ]; then
            gh issue comment $ISSUE_NUMBER --body "❌ Could not parse \`skill-name\` from the first line. Make sure the very first line is: \`skill-name: your-skill-name\`"
            exit 1
          fi

          echo "Skill name: $SKILL_NAME"

          # ── Extract SKILL.md content (everything after second ---) ──
          SKILL_CONTENT=$(echo "$ISSUE_BODY" | awk 'BEGIN{count=0} /^---/{count++; next} count>=2{print}')

          if [ -z "$SKILL_CONTENT" ]; then
            gh issue comment $ISSUE_NUMBER --body "❌ Could not find SKILL.md content. Make sure there are two \`---\` lines separating the skill name from the content."
            exit 1
          fi

          # ── Create and switch to new branch ──
          BRANCH="skill/$SKILL_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # ── Create skill folder and file ──
          mkdir -p "$SKILL_NAME"
          printf '%s\n' "$SKILL_CONTENT" > "$SKILL_NAME/SKILL.md"
          echo "Created $SKILL_NAME/SKILL.md"

          # ── Update README skills table ──
          TODAY=$(date +%Y-%m-%d)
          DESC=$(echo "$SKILL_CONTENT" | grep -m1 '^description:' | sed 's/description:[[:space:]]*//' | cut -c1-80)
          NEW_ROW="| [$SKILL_NAME](./$SKILL_NAME) | $DESC | $TODAY |"

          if [ -f README.md ] && grep -q "| Skill |" README.md; then
            python3 - <<PYEOF
          import re
          with open('README.md', 'r') as f:
              content = f.read()
          new_row = """$NEW_ROW"""
          pattern = r'(\|[^\n]+\|\n)(?!\|)'
          updated = re.sub(pattern, r'\1' + new_row + '\n', content, count=1, flags=re.MULTILINE)
          with open('README.md', 'w') as f:
              f.write(updated)
          PYEOF
          else
            cat >> README.md << MDEOF

          ## 🧠 Skills

          | Skill | Description | Added |
          |-------|-------------|-------|
          $NEW_ROW
          MDEOF
          fi

          # ── Commit and push branch ──
          git add "$SKILL_NAME/SKILL.md" README.md
          git commit -m "feat: add $SKILL_NAME skill (closes #$ISSUE_NUMBER)"
          git push origin "$BRANCH"

          # ── Create PR ──
          PR_URL=$(gh pr create \
            --title "feat: add $SKILL_NAME skill" \
            --body "Automated skill publish from issue #$ISSUE_NUMBER.

          **Skill:** \`$SKILL_NAME\`
          **Description:** $DESC

          Closes #$ISSUE_NUMBER" \
            --base main \
            --head "$BRANCH")

          echo "PR created: $PR_URL"

          # ── Auto-merge PR ──
          gh pr merge "$PR_URL" --merge --delete-branch

          # ── Comment on issue ──
          gh issue comment $ISSUE_NUMBER --body "✅ **\`$SKILL_NAME\`** published!

          📄 [\`$SKILL_NAME/SKILL.md\`](../blob/main/$SKILL_NAME/SKILL.md)
          🔀 PR merged: $PR_URL"
