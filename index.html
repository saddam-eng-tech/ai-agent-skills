<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Skills Marketplace</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0f;
      color: #e2e2e2;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-bottom: 1px solid #2a2a3e;
      padding: 32px 24px 24px;
      text-align: center;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    header p {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    .search-wrap {
      max-width: 520px;
      margin: 0 auto 16px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #e2e2e2;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: #a78bfa; }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
    }

    .filters {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: #94a3b8;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #a78bfa; color: #a78bfa; }
    .filter-btn.active {
      background: rgba(167,139,250,0.15);
      border-color: #a78bfa;
      color: #a78bfa;
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid #1e1e2e;
      font-size: 0.82rem;
      color: #64748b;
      flex-wrap: wrap;
    }
    .stat-item { display: flex; align-items: center; gap: 6px; }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: #141420;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      padding: 18px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--repo-color, #6366f1);
      opacity: 0.7;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--repo-color, #6366f1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .skill-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .repo-badge {
      font-size: 0.68rem;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
      border: 1px solid;
      white-space: nowrap;
    }

    .skill-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e2e2;
      line-height: 1.3;
      word-break: break-word;
    }

    .skill-desc {
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.5;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: auto;
      padding-top: 8px;
      border-top: 1px solid #1e1e2e;
      font-size: 0.75rem;
      color: #475569;
    }

    .loading {
      text-align: center;
      padding: 80px 20px;
      color: #475569;
      grid-column: 1 / -1;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #1e1e2e;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #475569;
      grid-column: 1 / -1;
    }
    .empty h3 { font-size: 1.1rem; margin-bottom: 8px; color: #64748b; }

    .error-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #fca5a5;
      font-size: 0.85rem;
      margin-bottom: 16px;
      text-align: center;
    }

    .add-repo-section {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #1e1e2e;
      margin-top: 40px;
      color: #475569;
      font-size: 0.82rem;
    }
    .add-repo-section code {
      background: #1e1e2e;
      padding: 2px 8px;
      border-radius: 4px;
      color: #a78bfa;
      font-size: 0.8rem;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.6rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ Claude Skills Marketplace</h1>
  <p>Browse, search, and discover Claude agent skills from the community</p>

  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search skills..." autocomplete="off" />
  </div>

  <div class="filters" id="repoFilters">
    <button class="filter-btn active" data-repo="all">All Repos</button>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat-item">
    <div class="stat-dot" style="background:#a78bfa"></div>
    <span id="totalCount">Loading...</span>
  </div>
</div>

<main>
  <div id="errorBanner" style="display:none" class="error-banner"></div>
  <div class="grid" id="skillsGrid">
    <div class="loading">
      <div class="spinner"></div>
      <p>Fetching skills from GitHub...</p>
    </div>
  </div>

  <div class="add-repo-section">
    Want to add your repo? Edit <code>REPOS</code> array in <code>index.html</code>
  </div>
</main>

<script>
// ─── ADD YOUR REPOS HERE ──────────────────────────────────
const REPOS = [
  {
    owner: 'saddam-eng-tech',
    repo: 'ai-agent-skills',
    skillsPath: '',
    label: 'saddam skills',
    color: '#6366f1',
    icon: '🛠'
  }
  // Add more repos below like this:
  // {
  //   owner: 'github-username',
  //   repo: 'repo-name',
  //   skillsPath: 'skills',   // folder inside repo, or '' for root
  //   label: 'display name',
  //   color: '#f59e0b',
  //   icon: '🌐'
  // }
];

// ─── ICON MAP ─────────────────────────────────────────────
const iconMap = {
  react: '⚛️', go: '🐹', golang: '🐹', ts: '🔷', typescript: '🔷',
  js: '🟨', python: '🐍', kotlin: '🎯', swift: '🍎', android: '🤖',
  docker: '🐳', agent: '🤖', mcp: '🔌', test: '🧪', tdd: '🧪',
  security: '🔒', api: '🔗', claude: '⚡', llm: '🧠', rag: '📚',
  database: '🗄️', db: '🗄️', postgres: '🐘', sql: '🗄️', migration: '🔄',
  figma: '🎨', design: '🎨', frontend: '🖥️', backend: '⚙️',
  grpc: '📡', proto: '📡', lint: '✅', error: '❗', log: '📋',
  context: '🧩', spec: '📝', component: '🧱', scaffold: '🏗️',
  token: '💰', cost: '💰', eval: '📊', trace: '🔍', audit: '🔍',
  django: '🦄', spring: '🌱', springboot: '🌱', cpp: '⚙️', perl: '🐪',
  java: '☕', video: '🎬', search: '🔍', content: '📄', article: '✍️',
  deploy: '🚀', hook: '🪝', class: '📦', multi: '🕸️', sub: '🧬',
  default: '⚡'
};

function getIcon(name) {
  const lower = name.toLowerCase();
  for (const [key, val] of Object.entries(iconMap)) {
    if (lower.includes(key)) return val;
  }
  return iconMap.default;
}

function formatName(slug) {
  return slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function getDesc(name) {
  const lower = name.toLowerCase();
  if (lower.includes('react')) return 'React component patterns and best practices';
  if (lower.includes('golang') || lower.includes('go-')) return 'Go language patterns and utilities';
  if (lower.includes('kotlin')) return 'Kotlin development patterns';
  if (lower.includes('swift')) return 'Swift/iOS development patterns';
  if (lower.includes('django')) return 'Django framework patterns and practices';
  if (lower.includes('springboot') || lower.includes('spring')) return 'Spring Boot Java patterns';
  if (lower.includes('python')) return 'Python coding patterns and testing';
  if (lower.includes('docker')) return 'Docker containerization patterns';
  if (lower.includes('agent')) return 'AI agent architecture and patterns';
  if (lower.includes('security')) return 'Security review and best practices';
  if (lower.includes('test') || lower.includes('tdd')) return 'Testing strategies and patterns';
  if (lower.includes('grpc')) return 'gRPC service implementation patterns';
  if (lower.includes('mcp')) return 'Model Context Protocol tooling';
  if (lower.includes('claude')) return 'Claude AI integration patterns';
  if (lower.includes('frontend')) return 'Frontend development patterns';
  if (lower.includes('backend')) return 'Backend architecture patterns';
  if (lower.includes('database') || lower.includes('db') || lower.includes('sql')) return 'Database patterns and migrations';
  return 'Claude agent skill for specialized tasks';
}

async function fetchSkills(repoConfig) {
  const { owner, repo, skillsPath } = repoConfig;
  const path = skillsPath ? `contents/${skillsPath}` : 'contents';
  const url = `https://api.github.com/repos/${owner}/${repo}/${path}`;
  const res = await fetch(url, {
    headers: { Accept: 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error(`Failed to fetch ${owner}/${repo}: ${res.status}`);
  const data = await res.json();
  return data
    .filter(item => item.type === 'dir' && !item.name.startsWith('.'))
    .map(item => ({
      name: item.name,
      displayName: formatName(item.name),
      description: getDesc(item.name),
      icon: getIcon(item.name),
      githubUrl: item.html_url,
      repo: repoConfig.repo,
      owner: repoConfig.owner,
      label: repoConfig.label,
      color: repoConfig.color,
      repoIcon: repoConfig.icon
    }));
}

let allSkills = [];
let activeRepo = 'all';
let searchQuery = '';

function renderGrid() {
  const grid = document.getElementById('skillsGrid');
  const countEl = document.getElementById('totalCount');

  let filtered = allSkills;
  if (activeRepo !== 'all') filtered = filtered.filter(s => s.repo === activeRepo);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.displayName.toLowerCase().includes(q) ||
      s.description.toLowerCase().includes(q)
    );
  }

  countEl.textContent = `${filtered.length} skill${filtered.length !== 1 ? 's' : ''} found`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><h3>No skills found</h3><p>Try a different search or filter</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(skill => `
    <a class="card" href="${skill.githubUrl}" target="_blank" rel="noopener"
       style="--repo-color: ${skill.color}">
      <div class="card-top">
        <div class="skill-icon">${skill.icon}</div>
        <span class="repo-badge" style="color:${skill.color}; border-color:${skill.color}; background:${skill.color}22">
          ${skill.repoIcon} ${skill.label}
        </span>
      </div>
      <div class="skill-name">${skill.displayName}</div>
      <div class="skill-desc">${skill.description}</div>
      <div class="card-footer">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        ${skill.owner}/${skill.repo}
        <span style="margin-left:auto; color:#334155">↗ View on GitHub</span>
      </div>
    </a>
  `).join('');
}

function buildFilters() {
  const container = document.getElementById('repoFilters');
  const statsBar = document.getElementById('statsBar');

  REPOS.forEach(r => {
    const count = allSkills.filter(s => s.repo === r.repo).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.repo = r.repo;
    btn.innerHTML = `${r.icon} ${r.label} <span style="opacity:0.6">(${count})</span>`;
    btn.addEventListener('click', () => {
      activeRepo = r.repo;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
    container.appendChild(btn);
  });

  container.querySelector('[data-repo="all"]').innerHTML =
    `All Repos <span style="opacity:0.6">(${allSkills.length})</span>`;

  const statItems = REPOS.map(r => {
    const count = allSkills.filter(s => s.repo === r.repo).length;
    return `<div class="stat-item">
      <div class="stat-dot" style="background:${r.color}"></div>
      <span>${r.icon} ${r.label}: <strong style="color:#94a3b8">${count}</strong></span>
    </div>`;
  }).join('');

  statsBar.innerHTML = `
    <div class="stat-item">
      <div class="stat-dot" style="background:#a78bfa"></div>
      <span id="totalCount">${allSkills.length} skills found</span>
    </div>
    ${statItems}
  `;
}

async function init() {
  const errorBanner = document.getElementById('errorBanner');
  const errors = [];

  const results = await Promise.allSettled(REPOS.map(fetchSkills));
  results.forEach((result, i) => {
    if (result.status === 'fulfilled') allSkills.push(...result.value);
    else errors.push(`Could not load ${REPOS[i].label}: ${result.reason.message}`);
  });

  if (errors.length > 0) {
    errorBanner.style.display = 'block';
    errorBanner.textContent = errors.join(' | ');
  }

  if (allSkills.length === 0) {
    document.getElementById('skillsGrid').innerHTML =
      `<div class="empty"><h3>No skills loaded</h3><p>Check console for errors</p></div>`;
    return;
  }

  allSkills.sort((a, b) => a.name.localeCompare(b.name));
  buildFilters();
  renderGrid();

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    renderGrid();
  });

  document.querySelector('[data-repo="all"]').addEventListener('click', () => {
    activeRepo = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-repo="all"]').classList.add('active');
    renderGrid();
  });
}

init();
</script>
</body>
</html>
